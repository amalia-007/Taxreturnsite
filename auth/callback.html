<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Please wait — GET MY TAX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: { 50:'#f0faf6', 100:'#dcf4ea', 500:'#00A86B', 600:'#009960', 700:'#007a4e', 800:'#005c3a' }
      }}}
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-800 to-brand-500 flex items-center justify-center p-4">

  <div class="w-full max-w-md text-center">
    <span class="text-3xl font-black text-white tracking-tight">GET MY TAX</span>

    <!-- Loading state -->
    <div id="loading" class="mt-10 bg-white rounded-2xl shadow-2xl p-10">
      <div class="mx-auto mb-4 h-10 w-10 rounded-full border-4 border-brand-100 border-t-brand-500 animate-spin"></div>
      <p class="text-gray-600 font-medium">Verifying your account…</p>
    </div>

    <!-- Password reset form -->
    <div id="reset-card" class="hidden mt-10 bg-white rounded-2xl shadow-2xl p-8 text-left">
      <h2 class="text-xl font-bold text-gray-900 mb-1">Set a new password</h2>
      <p class="text-gray-500 text-sm mb-6">Choose a strong password for your account.</p>

      <div id="reset-error" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

      <form id="reset-form" novalidate>
        <div class="mb-4">
          <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
          <input
            type="password" id="new-password" required autocomplete="new-password"
            placeholder="Minimum 8 characters"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
          />
        </div>
        <div class="mb-6">
          <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
          <input
            type="password" id="confirm-password" required autocomplete="new-password"
            placeholder="Repeat password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
          />
        </div>
        <button
          type="submit" id="reset-submit"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 rounded-lg transition text-sm disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Update password
        </button>
      </form>
    </div>

    <!-- Error state -->
    <div id="error-card" class="hidden mt-10 bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-4xl mb-3">❌</div>
      <h2 class="text-lg font-bold text-gray-900 mb-2">Link expired or invalid</h2>
      <p class="text-gray-500 text-sm mb-6">This link has expired or has already been used.</p>
      <a href="login.html" class="inline-block bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 px-6 rounded-lg transition text-sm">
        Back to login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    'use strict';

    const loading   = document.getElementById('loading');
    const resetCard = document.getElementById('reset-card');
    const errorCard = document.getElementById('error-card');
    const resetErr  = document.getElementById('reset-error');

    function show(el) {
      [loading, resetCard, errorCard].forEach(e => e.classList.add('hidden'));
      el.classList.remove('hidden');
    }

    // Supabase JS v2 automatically exchanges the token in the URL hash.
    // We listen to onAuthStateChange to react to the result.
    window.sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User clicked a password-reset link — show the set-new-password form.
        show(resetCard);
        return;
      }

      if (event === 'SIGNED_IN' && session) {
        // Email confirmation or magic link — route to the right page.
        const { data: profile } = await window.sb.from('profiles')
          .select('has_paid, welcome_sent').eq('id', session.user.id).single();

        // Send welcome email on first-ever sign-in (best-effort, non-blocking)
        if (!profile?.welcome_sent) {
          fetch(`${window.SUPABASE_URL}/functions/v1/send-welcome-email`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${session.access_token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: session.user.email }),
          }).catch(() => {}); // swallow errors — don't block redirect

          // Mark welcome as sent so we don't re-send on future logins
          window.sb.from('profiles').update({ welcome_sent: true }).eq('id', session.user.id).then(() => {});
        }

        window.location.replace(
          profile?.has_paid ? siteUrl('/app/dashboard.html') : siteUrl('/app/payment.html')
        );
        return;
      }
    });

    // If no auth event fires within 4 s, show an error (expired/invalid link).
    const timeout = setTimeout(() => show(errorCard), 4000);
    window.sb.auth.getSession().then(({ data: { session } }) => {
      if (session) clearTimeout(timeout);
    });

    // ── Password reset form ────────────────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw      = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const btn     = document.getElementById('reset-submit');
      resetErr.classList.add('hidden');

      if (pw.length < 8) {
        resetErr.textContent = 'Password must be at least 8 characters.';
        resetErr.classList.remove('hidden');
        return;
      }
      if (pw !== confirm) {
        resetErr.textContent = 'Passwords do not match.';
        resetErr.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Updating…';

      const { error } = await window.sb.auth.updateUser({ password: pw });
      btn.disabled    = false;
      btn.textContent = 'Update password';

      if (error) {
        resetErr.textContent = error.message;
        resetErr.classList.remove('hidden');
        return;
      }

      // Success — redirect to dashboard
      window.location.replace(siteUrl('/app/dashboard.html'));
    });
  </script>
</body>
</html>
